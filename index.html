<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Timers</title>

<style>
:root{
  --displayw:80px;
  --gap:5px;
  --timew:66px;
  --indent:calc(var(--displayw) + (2 * var(--gap)));
}

body{
  font-family:Arial,sans-serif;
  font-size:15px;
  margin:5px;
}

input,button,textarea{
  font-family:Arial,sans-serif;
  font-size:15px;
}

input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button{
  -webkit-appearance:none;
  margin:0;
}

input[type="number"]{
  -moz-appearance:textfield;
  appearance:textfield;
}

#timers{
  overflow-x:visible;
}

.timer-row{
  display:flex;
  align-items:center;
  gap:var(--gap);
  margin-bottom:var(--gap);
  user-select:none;
  flex-wrap:nowrap;
}

.display{
  font-size:20px;
  margin-right:var(--gap);
  min-width:var(--displayw);
  text-align:right;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
  touch-action:none;
}

.name{
  width:var(--timew);
  height:25px;
  box-sizing:border-box;
  padding:0 2px;
  text-align:left;
}

.timebox{
  width:var(--timew);
  height:25px;
  box-sizing:border-box;
  padding:0 2px;
  text-align:left;
}

.cb{
  width:25px;
  height:25px;
  margin:0;
}

@media (max-width:700px){
  :root{--timew:71px;}

  .timer-row{
    flex-wrap:wrap;
    padding-left:var(--indent);
  }

  .display{
    margin-left:calc(-1 * var(--indent));
  }

  input,button,textarea{
    font-size:16px;
  }
}
</style>
</head>
<body>

<div id="timers"></div>

<script>
const timersContainer = document.getElementById("timers");

const STORAGE_KEY_BASE = "1";
const TIMER_COUNT = 25;

const MAX_HOURS = 99;
const MAX_MINUTES = 59;
const MAX_SECONDS = 59;

const FIXED_NOTIFY_COUNT = 2;
const FIXED_NOTIFY_DELAY_SECONDS = 0.25;

const SOUND_URL = new URL("Notification.wav", document.baseURI).href;

function pad2(n){
  return String(n).padStart(2, "0");
}

function formatHMSFixed(totalSeconds){
  const t = Math.max(0, Math.floor(totalSeconds));
  const h = Math.floor(t / 3600);
  const m = Math.floor((t % 3600) / 60);
  const s = t % 60;
  const hh = h < 100 ? pad2(h) : String(h);
  return hh + ":" + pad2(m) + ":" + pad2(s);
}

function formatTimeForBox(totalSeconds){
  const t = Math.max(0, Math.floor(totalSeconds));
  const h = Math.floor(t / 3600);
  const m = Math.floor((t % 3600) / 60);
  const s = t % 60;
  const hh = h < 10 ? "0" + h : String(h);
  return hh + ":" + pad2(m) + ":" + pad2(s);
}

function parseTimeToSeconds(raw){
  const s = String(raw || "").trim();
  if(s === "") return { blank: true, seconds: 0 };

  const parts = s.split(":").map((p) => p.trim()).filter((p) => p !== "");
  if(parts.length === 0 || parts.length > 3) return { blank: false, seconds: 0, invalid: true };

  for(let i = 0; i < parts.length; i++){
    if(!/^\d+$/.test(parts[i])) return { blank: false, seconds: 0, invalid: true };
  }

  let h = 0;
  let m = 0;
  let sec = 0;

  if(parts.length === 3){
    h = Number(parts[0]);
    m = Number(parts[1]);
    sec = Number(parts[2]);
  }else if(parts.length === 2){
    m = Number(parts[0]);
    sec = Number(parts[1]);
  }else{
    sec = Number(parts[0]);
  }

  h = Math.min(MAX_HOURS, Math.max(0, Math.floor(h)));
  m = Math.min(MAX_MINUTES, Math.max(0, Math.floor(m)));
  sec = Math.min(MAX_SECONDS, Math.max(0, Math.floor(sec)));

  return { blank: false, seconds: h * 3600 + m * 60 + sec };
}

function normalizeTimeBox(el){
  const parsed = parseTimeToSeconds(el.value);

  if(parsed.blank || parsed.invalid){
    el.value = "";
    return 0;
  }

  el.value = formatTimeForBox(parsed.seconds);
  return parsed.seconds;
}

function blockTimeTyping(el){
  el.addEventListener("keydown", (e) => {
    if(e.ctrlKey || e.metaKey || e.altKey) return;

    const okKeys = [
      "Backspace", "Delete", "Tab", "Escape", "Enter",
      "ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Home", "End"
    ];

    if(okKeys.includes(e.key)) return;
    if(e.key >= "0" && e.key <= "9") return;
    if(e.key === ":") return;

    e.preventDefault();
  });
}

function ensureInputShowsLeft(el){
  requestAnimationFrame(() => {
    el.scrollLeft = 0;
    try{
      el.setSelectionRange(0, 0);
    }catch{}
  });
}

function getSessionKey(){
  return STORAGE_KEY_BASE;
}

function loadState(){
  const raw = localStorage.getItem(getSessionKey());
  if(!raw) return null;

  try{
    const parsed = JSON.parse(raw);
    if(!Array.isArray(parsed)) return null;
    return parsed;
  }catch{
    return null;
  }
}

function saveState(items){
  localStorage.setItem(getSessionKey(), JSON.stringify(items));
}

function defaultItem(id){
  return {
    id: id,
    name: "",
    timeStr: "",
    totalSeconds: 0,
    mode: "idle",
    hasStarted: false,
    notifyEnabled: false,
    loopEnabled: false,
    runningBaseSeconds: 0,
    runningStartAt: 0
  };
}

function ensureState(){
  const stored = loadState();

  if(!stored){
    const fresh = [];

    for(let i = 0; i < TIMER_COUNT; i++){
      fresh.push(defaultItem(i + 1));
    }

    saveState(fresh);
    return fresh;
  }

  const seen = new Set();
  const out = [];

  for(let i = 0; i < stored.length; i++){
    const it = stored[i];

    if(!it || typeof it.id !== "number") continue;
    if(it.id < 1 || it.id > TIMER_COUNT) continue;
    if(seen.has(it.id)) continue;

    seen.add(it.id);
    out.push(Object.assign(defaultItem(it.id), it));
  }

  for(let id = 1; id <= TIMER_COUNT; id++){
    if(!seen.has(id)){
      out.push(defaultItem(id));
    }
  }

  saveState(out);
  return out;
}

let items = ensureState();

function getItemById(id){
  for(let i = 0; i < items.length; i++){
    if(items[i].id === id) return items[i];
  }
  return null;
}

function createTimerRow(data){
  const id = data.id;

  const row = document.createElement("div");
  row.className = "timer-row";
  row.dataset.itemId = String(id);

  row.innerHTML = `
    <div class="display" id="rDisplay${id}">00:00:00</div>
    <input class="name" id="rName${id}" type="text">
    <input class="timebox" id="rTime${id}" type="text" inputmode="numeric">
    <input class="cb" id="rReset${id}" type="checkbox">
    <input class="cb" id="rRun${id}" type="checkbox">
    <input class="cb" id="rNotify${id}" type="checkbox">
    <input class="cb" id="rLoop${id}" type="checkbox">
  `;

  timersContainer.appendChild(row);

  const display = document.getElementById(`rDisplay${id}`);
  const nameInput = document.getElementById(`rName${id}`);
  const timeInput = document.getElementById(`rTime${id}`);
  const resetCb = document.getElementById(`rReset${id}`);
  const runCb = document.getElementById(`rRun${id}`);
  const notifyCb = document.getElementById(`rNotify${id}`);
  const loopCb = document.getElementById(`rLoop${id}`);

  blockTimeTyping(timeInput);

  let totalSeconds = Number(data.totalSeconds || 0);
  let intervalId = null;
  let hasStarted = Boolean(data.hasStarted);
  let runningBaseSeconds = Number(data.runningBaseSeconds || 0);
  let runningStartAt = Number(data.runningStartAt || 0);

  function render(){
    display.textContent = formatHMSFixed(totalSeconds);
  }

  function snapshot(mode){
    const item = getItemById(id);
    if(!item) return;

    item.name = nameInput.value || "";
    item.timeStr = String(timeInput.value || "");
    item.totalSeconds = totalSeconds;
    item.mode = mode;
    item.hasStarted = hasStarted;
    item.notifyEnabled = notifyCb.checked;
    item.loopEnabled = loopCb.checked;
    item.runningBaseSeconds = runningBaseSeconds;
    item.runningStartAt = runningStartAt;

    saveState(items);
  }

  function computeRunningSeconds(){
    const elapsed = Math.floor((Date.now() - runningStartAt) / 1000);
    return Math.max(0, runningBaseSeconds - elapsed);
  }

  function getTimeSeconds(){
    const p = parseTimeToSeconds(timeInput.value);
    if(p.blank || p.invalid) return 0;
    return p.seconds;
  }

  function getNotificationTitle(){
    const name = String(nameInput.value || "").trim();
    if(name === "") return "Timer";
    return name;
  }

  function showBrowserNotification(){
    if(!("Notification" in window)) return;
    if(!window.isSecureContext) return;
    if(Notification.permission !== "granted") return;

    try{
      new Notification(getNotificationTitle());
    }catch{}
  }

  function maybeRequestNotificationPermission(){
    if(!("Notification" in window)) return;
    if(!window.isSecureContext) return;
    if(Notification.permission === "default"){
      Notification.requestPermission().catch(() => {});
    }
  }

  function playNotification(){
    for(let i = 0; i < FIXED_NOTIFY_COUNT; i++){
      const ms = Math.round(i * FIXED_NOTIFY_DELAY_SECONDS * 1000);

      setTimeout(() => {
        const audio = new Audio(SOUND_URL);
        audio.play().catch(() => {});
      }, ms);
    }

    showBrowserNotification();
  }

  function tick(){
    totalSeconds = computeRunningSeconds();
    render();
    snapshot("running");

    if(totalSeconds <= 0){
      totalSeconds = 0;
      render();

      if(notifyCb.checked){
        playNotification();
      }

      if(loopCb.checked){
        const next = getTimeSeconds();

        if(next > 0){
          runningBaseSeconds = next;
          runningStartAt = Date.now();
          totalSeconds = next;
          render();
          snapshot("running");
          return;
        }
      }

      pauseRunning();
    }
  }

  function startRunning(){
    if(!hasStarted){
      totalSeconds = getTimeSeconds();

      if(totalSeconds <= 0){
        runCb.checked = false;
        return;
      }

      hasStarted = true;
    }else{
      if(totalSeconds <= 0){
        runCb.checked = false;
        return;
      }
    }

    runningBaseSeconds = totalSeconds;
    runningStartAt = Date.now();

    clearInterval(intervalId);
    intervalId = setInterval(tick, 250);

    snapshot("running");
  }

  function pauseRunning(){
    if(runningStartAt !== 0){
      totalSeconds = computeRunningSeconds();
    }

    clearInterval(intervalId);
    intervalId = null;

    runningBaseSeconds = totalSeconds;
    runningStartAt = 0;
    runCb.checked = false;

    render();
    snapshot(totalSeconds > 0 ? "paused" : "idle");
  }

  function reset(){
    clearInterval(intervalId);
    intervalId = null;

    totalSeconds = 0;
    hasStarted = false;
    runningBaseSeconds = 0;
    runningStartAt = 0;

    runCb.checked = false;

    render();
    snapshot("idle");
  }

  nameInput.value = data.name || "";
  timeInput.value = String(data.timeStr || "");
  notifyCb.checked = Boolean(data.notifyEnabled);
  loopCb.checked = Boolean(data.loopEnabled);

  if(String(timeInput.value || "").trim() !== ""){
    normalizeTimeBox(timeInput);
  }

  ensureInputShowsLeft(nameInput);
  ensureInputShowsLeft(timeInput);

  render();

  nameInput.addEventListener("input", () => {
    snapshot(intervalId !== null ? "running" : "idle");
  });

  timeInput.addEventListener("input", () => {
    totalSeconds = 0;
    hasStarted = false;
    runningBaseSeconds = 0;
    runningStartAt = 0;
    runCb.checked = false;
    clearInterval(intervalId);
    intervalId = null;
    render();
    snapshot("idle");
  });

  timeInput.addEventListener("blur", () => {
    normalizeTimeBox(timeInput);
    ensureInputShowsLeft(timeInput);
    snapshot(intervalId !== null ? "running" : "idle");
  });

  notifyCb.addEventListener("change", () => {
    if(notifyCb.checked){
      maybeRequestNotificationPermission();
    }
    snapshot(intervalId !== null ? "running" : "idle");
  });

  loopCb.addEventListener("change", () => {
    snapshot(intervalId !== null ? "running" : "idle");
  });

  runCb.addEventListener("change", () => {
    if(runCb.checked) startRunning();
    else pauseRunning();
  });

  resetCb.addEventListener("change", () => {
    if(resetCb.checked){
      reset();
      resetCb.checked = false;
    }
  });

  if(data.mode === "running" && data.runningStartAt && data.runningBaseSeconds){
    runningBaseSeconds = Number(data.runningBaseSeconds || 0);
    runningStartAt = Number(data.runningStartAt || Date.now());
    totalSeconds = computeRunningSeconds();

    if(totalSeconds > 0){
      runCb.checked = true;
      clearInterval(intervalId);
      intervalId = setInterval(tick, 250);
      render();
    }else{
      pauseRunning();
    }
  }else if(data.mode === "paused"){
    totalSeconds = Number(data.totalSeconds || 0);
    runningBaseSeconds = totalSeconds;
    runningStartAt = 0;
    hasStarted = totalSeconds > 0;
    render();
  }else{
    totalSeconds = Number(data.totalSeconds || 0);
    render();
  }
}

function saveAllFromDOM(){
  const rows = Array.from(timersContainer.querySelectorAll(".timer-row"));

  for(let i = 0; i < rows.length; i++){
    const id = Number(rows[i].dataset.itemId);
    const item = getItemById(id);
    if(!item) continue;

    const nameInput = rows[i].querySelector(`#rName${id}`);
    const timeInput = rows[i].querySelector(`#rTime${id}`);
    const notifyCb = rows[i].querySelector(`#rNotify${id}`);
    const loopCb = rows[i].querySelector(`#rLoop${id}`);

    item.name = nameInput ? (nameInput.value || "") : item.name;
    item.timeStr = timeInput ? String(timeInput.value || "") : item.timeStr;
    item.notifyEnabled = Boolean(notifyCb && notifyCb.checked);
    item.loopEnabled = Boolean(loopCb && loopCb.checked);
  }

  saveState(items);
}

function renderAllTimers(){
  timersContainer.innerHTML = "";

  for(let i = 0; i < items.length; i++){
    createTimerRow(items[i]);
  }
}

document.addEventListener("input", (e) => {
  const t = e.target;
  if(!t) return;

  if(t.classList && (t.classList.contains("name") || t.classList.contains("timebox"))){
    saveAllFromDOM();
  }
}, true);

document.addEventListener("change", (e) => {
  const t = e.target;
  if(!t) return;

  if(t.classList && (t.classList.contains("name") || t.classList.contains("timebox") || t.classList.contains("cb"))){
    saveAllFromDOM();
  }
}, true);

window.addEventListener("beforeunload", () => {
  saveAllFromDOM();
});

window.addEventListener("pagehide", () => {
  saveAllFromDOM();
});

document.addEventListener("visibilitychange", () => {
  if(document.hidden){
    saveAllFromDOM();
  }
});

renderAllTimers();
</script>

</body>
</html>
